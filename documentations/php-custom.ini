; Configurações customizadas de PHP para Multi-Menu
; Estas configurações garantem persistência de sessão e segurança

[Session]
; Configurações de sessão persistente
session.save_handler = files
session.save_path = "/tmp/php_sessions"
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = MULTIMENU_SESS

; Cookie persistente por 30 dias
session.cookie_lifetime = 2592000
session.gc_maxlifetime = 2592000

; Segurança de cookies
session.cookie_httponly = 1
session.cookie_secure = 0
session.cookie_samesite = "Lax"

; Garbage collection
session.gc_probability = 1
session.gc_divisor = 100

; Upload limits
upload_max_filesize = 50M
post_max_size = 50M

; Memory limit
memory_limit = 256M

; Timezone
date.timezone = "America/Sao_Paulo"

; Error reporting (production)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/www/html/storage/logs/php-errors.log
