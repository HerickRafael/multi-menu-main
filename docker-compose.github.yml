version: '3.8'

services:
  # Aplicação PHP
  app:
    image: ghcr.io/herickrafael/multi-menu:latest
    environment:
      - APP_ENV=production
      - BASE_URL=https://wollburger.online
      - DB_HOST=grifet.com
      - DB_PORT=3306
      - DB_NAME=multimenu
      - DB_USER=root
      - DB_PASS=dbf50305959938e515b583917c05f61b
      - DB_CHARSET=utf8mb4
    volumes:
      - uploads:/var/www/html/public/uploads
      - logs:/var/www/html/storage/logs
      - cache:/var/www/html/storage/cache
    networks:
      - rede
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=rede"
        - "traefik.http.routers.multi_menu.rule=Host(`wollburger.online`) || Host(`www.wollburger.online`)"
        - "traefik.http.routers.multi_menu.entrypoints=websecure"
        - "traefik.http.routers.multi_menu.tls=true"
        - "traefik.http.routers.multi_menu.tls.certresolver=letsencrypt"
        - "traefik.http.services.multi_menu.loadbalancer.server.port=80"
        # Redirect HTTP to HTTPS
        - "traefik.http.routers.multi_menu_http.rule=Host(`wollburger.online`) || Host(`www.wollburger.online`)"
        - "traefik.http.routers.multi_menu_http.entrypoints=web"
        - "traefik.http.routers.multi_menu_http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
        # Watchtower - Auto update
        - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower - Auto-deploy quando houver nova imagem no GitHub
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_LABEL_ENABLE=true
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

volumes:
  uploads:
  logs:
  cache:

networks:
  rede:
    name: rede
    external: true
