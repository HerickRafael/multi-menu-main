version: "3.7"

services:

## --------------------------- MULTI MENU --------------------------- ##

  multi_menu_app:
    image: multi-menu-app:latest

    volumes:
      - multi_menu_uploads:/var/www/html/public/uploads
      - multi_menu_logs:/var/www/html/storage/logs
      - multi_menu_cache:/var/www/html/storage/cache

    networks:
      - rede

    environment:
      ## Configuração da aplicação
      - APP_ENV=production
      - BASE_URL=https://wollburger.online
      
      ## Dados do MySQL
      - DB_HOST=85.31.231.130
      - DB_PORT=3306
      - DB_NAME=multimenu
      - DB_USER=root
      - DB_PASS=dbf50305959938e515b583917c05f61b
      - DB_CHARSET=utf8mb4

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.multi_menu.rule=Host(`wollburger.online`) || Host(`www.wollburger.online`)
        - traefik.http.routers.multi_menu.entrypoints=web,websecure
        - traefik.http.routers.multi_menu.tls.certresolver=letsencryptresolver
        - traefik.http.services.multi_menu.loadbalancer.server.port=80
        - traefik.http.routers.multi_menu.service=multi_menu

  # Watchtower - Auto-deploy quando houver nova imagem no GitHub
  multi_menu_watchtower:
    image: containrrr/watchtower

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_LABEL_ENABLE=true

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # phpMyAdmin - Gerenciamento do banco de dados
  phpmyadmin:
    image: phpmyadmin:latest

    networks:
      - rede

    environment:
      - PMA_HOST=85.31.231.130
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=dbf50305959938e515b583917c05f61b
      - UPLOAD_LIMIT=50M

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.phpmyadmin.rule=Host(`db.wollburger.online`)
        - traefik.http.routers.phpmyadmin.entrypoints=web,websecure
        - traefik.http.routers.phpmyadmin.tls.certresolver=letsencryptresolver
        - traefik.http.services.phpmyadmin.loadbalancer.server.port=80
        - traefik.http.routers.phpmyadmin.service=phpmyadmin

## --------------------------- MULTI MENU --------------------------- ##

volumes:
  multi_menu_uploads:
    external: true
    name: multi_menu_uploads
  multi_menu_logs:
    external: true
    name: multi_menu_logs
  multi_menu_cache:
    external: true
    name: multi_menu_cache

networks:
  rede:
    external: true
    name: rede
